<!DOCTYPE html>
<html>
<head>
  <title>Text Formatter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .label {
      font-weight: bold;
      margin: 10px 0 6px;
    }

    .editor {
      width: 100%;
      min-height: 200px;
      background: white;
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: #000;
    }

    .editor,
    .editor * {
      font-family: Arial, Helvetica, sans-serif !important;
      color: #000 !important;
      box-sizing: border-box;
    }

    .editor p {
      margin: 0 0 8px 0 !important;
      padding: 0 !important;
    }

    .editor ul {
      margin: 0 0 14px 0 !important;
      padding-left: 22px !important;
    }

    .editor li {
      margin: 0 0 4px 0 !important;
    }

    button {
      padding: 10px 20px;
      background: #003a5b;
      color: white;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      margin-right: 10px;
      font-weight: bold;
    }

    #copiedMsg {
      display: none;
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h2>Text Formatter</h2>

  <div class="label">Paste Here:</div>
  <div id="input" class="editor" contenteditable="true"></div>

  <button onclick="formatText()">Format</button>
  <button onclick="copyText()">Copy Text</button>

  <div id="copiedMsg">Copied!</div>

  <div class="label">Output:</div>
  <div id="output" class="editor"></div>

  <script>
    function formatText() {
      const input = document.getElementById("input");
      const output = document.getElementById("output");

      const clone = input.cloneNode(true);
      const all = clone.querySelectorAll("*");

      all.forEach(el => {
        el.style.color = "";
        el.style.fontFamily = "";
        el.style.fontSize = "";
        el.style.margin = "";
        el.style.padding = "";
        el.style.lineHeight = "";
        el.style.textIndent = "";
      });

      output.innerHTML = clone.innerHTML;
    }

    function copyText() {
  const output = document.getElementById("output");

  let text = "";

  const items = output.querySelectorAll("li");

  if (items.length > 0) {
    // If list exists → rebuild with bullets
    items.forEach(li => {
      text += "• " + li.innerText.trim() + "\n";
    });
  } else {
    // Fallback if no list
    text = output.innerText;
  }

  const temp = document.createElement("textarea");
  temp.value = text.trim();
  document.body.appendChild(temp);

  temp.select();
  document.execCommand("copy");

  document.body.removeChild(temp);

  showCopiedMessage();
}

    function showCopiedMessage() {
      const msg = document.getElementById("copiedMsg");
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 1500);
    }
  </script>

</body>
</html>
