<!DOCTYPE html>
<html>
<head>
  <title>Text Formatter</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 {
      margin-bottom: 10px;
    }

    .label {
      font-weight: bold;
      margin: 10px 0 6px;
    }

    .editor {
      width: 100%;
      min-height: 200px;
      background: white;
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: #000;
    }

    /* Force consistent styling */
    .editor,
    .editor * {
      font-family: Arial, Helvetica, sans-serif !important;
      color: #000 !important;
      box-sizing: border-box;
    }

    .editor ul {
      margin: 0 0 12px 0 !important;
      padding-left: 20px !important;
    }

    .editor li {
      margin: 0 0 6px 0 !important;
    }

    button {
      padding: 10px 20px;
      background: #003a5b;
      color: white;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      font-weight: bold;
    }

    #copiedMsg {
      display: none;
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h2>Text Formatter</h2>

  <div class="label">Paste Here:</div>
  <div id="input" class="editor" contenteditable="true"></div>

  <button onclick="formatText()">Format and Copy</button>

  <div id="copiedMsg">Copied to clipboard!</div>

  <div class="label">Preview:</div>
  <div id="output" class="editor"></div>

  <script>
    function formatText() {
      const input = document.getElementById("input");
      const output = document.getElementById("output");

      const clone = input.cloneNode(true);
      const all = clone.querySelectorAll("*");

      all.forEach(el => {
        // Remove ALL junk
        el.removeAttribute("style");

        [...el.attributes].forEach(attr => {
          if (attr.name.startsWith("data-")) {
            el.removeAttribute(attr.name);
          }
        });
      });

      // Apply clean formatting
      const lists = clone.querySelectorAll("ul");
      lists.forEach(ul => {
        ul.setAttribute("style", "margin:0 0 12px 0; padding-left:20px; color:#000;");
      });

      const items = clone.querySelectorAll("li");
      items.forEach(li => {
        li.setAttribute("style", "margin-bottom:6px; color:#000;");
      });

      const cleanedHTML = clone.innerHTML;

      // Show preview
      output.innerHTML = cleanedHTML;

      // 🔥 Reliable copy (works everywhere)
      copyToClipboard(cleanedHTML);

      // Show confirmation
      showCopiedMessage();
    }

    function copyToClipboard(text) {
      const temp = document.createElement("textarea");
      temp.value = text;
      document.body.appendChild(temp);

      temp.select();
      document.execCommand("copy");

      document.body.removeChild(temp);
    }

    function showCopiedMessage() {
      const msg = document.getElementById("copiedMsg");
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 1500);
    }
  </script>

</body>
</html>
