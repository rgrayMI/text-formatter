<!DOCTYPE html>
<html>
<head>
  <title>Text Formatter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .label {
      font-weight: bold;
      margin: 10px 0 6px;
    }

    .editor {
      width: 100%;
      min-height: 200px;
      background: white;
      border: 1px solid #ccc;
      padding: 12px;
      margin-bottom: 12px;
      box-sizing: border-box;

      font-family: Arial, Helvetica, sans-serif;
      font-size: 14px;
      line-height: 1.45;
      color: #000;
    }

    .editor,
    .editor * {
      font-family: Arial, Helvetica, sans-serif !important;
      color: #000 !important;
      box-sizing: border-box;
    }

    .editor p {
      margin: 0 0 8px 0 !important;
      padding: 0 !important;
      line-height: 1.45 !important;
    }

    .editor ul {
      margin: 0 0 14px 0 !important;
      padding-left: 22px !important;
      list-style-position: outside !important;
    }

    .editor li {
      margin: 0 0 4px 0 !important;
      padding: 0 !important;
      line-height: 1.45 !important;
    }

    .editor li:last-child {
      margin-bottom: 0 !important;
    }

    .editor li p,
    .editor li span,
    .editor li div {
      margin: 0 !important;
      padding: 0 !important;
      line-height: 1.45 !important;
    }

    button {
      padding: 10px 20px;
      background: #003a5b;
      color: white;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      margin-right: 10px;
      font-weight: bold;
    }

    #copiedMsg {
      display: none;
      color: green;
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <h2>Text Color Normalizer</h2>

  <div class="label">Paste Here:</div>
  <div id="input" class="editor" contenteditable="true"></div>

  <button onclick="formatText()">Format</button>
  <button onclick="copyText()">Copy Text</button>

  <div id="copiedMsg">Copied!</div>

  <div class="label">Output:</div>
  <div id="output" class="editor" contenteditable="true"></div>

  <script>
    function formatText() {
      const input = document.getElementById("input");
      const output = document.getElementById("output");

      const clone = input.cloneNode(true);
      const all = clone.querySelectorAll("*");

      all.forEach(el => {
        el.style.color = "";
        el.style.fontFamily = "";
        el.style.fontSize = "";
        el.style.margin = "";
        el.style.padding = "";
        el.style.lineHeight = "";
        el.style.textIndent = "";
      });

      output.innerHTML = clone.innerHTML;
    }

    function copyText() {
      const output = document.getElementById("output");

      const selection = window.getSelection();
      const range = document.createRange();

      selection.removeAllRanges();
      range.selectNodeContents(output);
      selection.addRange(range);

      document.execCommand("copy");

      selection.removeAllRanges();
      showCopiedMessage();
    }

    function showCopiedMessage() {
      const msg = document.getElementById("copiedMsg");
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 1500);
    }
  </script>

</body>
</html>
